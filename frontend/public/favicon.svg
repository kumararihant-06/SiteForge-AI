<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338CA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C7D2FE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)" />

  <!-- Browser window shape -->
  <rect x="10" y="16" width="44" height="32" rx="4" ry="4" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.3"/>

  <!-- Browser top bar -->
  <line x1="10" y1="24" x2="54" y2="24" stroke="white" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Three dots -->
  <circle cx="16" cy="20" r="1.5" fill="white" fill-opacity="0.5"/>
  <circle cx="21" cy="20" r="1.5" fill="white" fill-opacity="0.5"/>
  <circle cx="26" cy="20" r="1.5" fill="white" fill-opacity="0.5"/>

  <!-- AI sparkle / lightning bolt centered in browser body -->
  <path d="M35 28 L29 36 L33 36 L29 46 L39 34 L35 34 Z"
    fill="url(#sparkGrad)"
    stroke="white"
    stroke-width="0.5"
    stroke-linejoin="round"
  />
</svg>